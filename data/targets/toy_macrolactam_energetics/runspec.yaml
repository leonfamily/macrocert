name: toy_macrolactam_energetics
target:
  structure_path: ../toy_macrolactam/structure.mol
  ring_size: 13

blocks:
  - aminododecanoic_acid

rules: all_macrocyclization

strategy:
  max_steps: 1
  ring_close_only: true

solver:
  backend: scip
  top_n: 5
  time_budget_s: 60

energetics:
  enabled: true
  initial_tier: xtb
  dG_kcal_max: 30.0   # gas-phase macrolactamization barrier-tolerant ceiling

notes: |
  Same target as toy_macrolactam, energetics enabled. Exercises the
  lazy-feedback loop end-to-end:
  - Solve top-1 → macrolactamization edge appears.
  - xtb single-points the reactant + products → ΔG_rxn ≈ +3.87 kcal/mol
    (cached under .cache/energetics/).
  - ΔG ≤ 30.0 → edge survives, no blacklist, no re-solve.
  - Certificate carries energetics_dependencies populated.
  Second run hits the cache for zero recomputation.
