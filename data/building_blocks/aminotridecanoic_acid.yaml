name: 13-aminotridecanoic acid
smiles: OC(=O)CCCCCCCCCCCCN
provenance: |
  Surrogate panel building block — 14-membered macrolactam precursor.
  Commercially available; not from a CASP run.
notes: |
  Linear ω-aminoacid that cyclizes to a 14-membered
  macrolactam in one rule firing (macrolactamization).
