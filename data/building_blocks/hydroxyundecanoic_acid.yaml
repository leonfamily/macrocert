name: 11-hydroxyundecanoic acid
smiles: OC(=O)CCCCCCCCCCO
provenance: |
  Surrogate panel building block — 12-membered macrolactone precursor (Mukaiyama 1976 n=10 series). DOI:10.1246/cl.1976.49
notes: |
  Linear omega-hydroxy acid that cyclizes to a 12-membered
  macrolactone in one rule firing (macrolactonization).
