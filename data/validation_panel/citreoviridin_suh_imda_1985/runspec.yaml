name: citreoviridin_suh_imda_1985

# WARNING: This case is unfillable as named. See notes.md and
# research_brief.md. The runspec is provided in scaffolded form so the
# panel runner doesn't choke on a missing file, but the case will
# correctly fail (witness != optimal) until Ivan reassigns the target.

target:
  structure_path: structure.mol
  # The macrocyclic precursor for the intended TDA closure does not
  # exist in the citreoviridin synthesis (citreoviridin is not
  # macrocyclic). If reassigned to Berube-Deslongchamps 1987 → 13;
  # if reassigned to Phoenix-Reddy cassaine 2008 → 14.
  ring_size: null

blocks:
  # No literature-supported block decomposition exists for citreoviridin
  # via TDA. Placeholder name pending reassignment.
  - tda_target_TBD

rules: all_macrocyclization

strategy_predicates:
  is_intramolecular: true
  # ring_size_equals is intentionally omitted because the slot's ring
  # size is undefined as named. Add after reassignment.

energetics:
  enabled: false

solver:
  backend: scip
  top_n: 3
  time_budget_s: 30

notes: |
  Slot unfillable as named — citreoviridin is not macrocyclic, no Suh
  1985 paper exists, and no citreoviridin total synthesis uses TDA.

  See research_brief.md for the full diagnosis. The panel runner is
  expected to return witness=infeasible (matching expected.yaml) until
  this slot is reassigned to a real TDA target (Berube-Deslongchamps
  1987 or Phoenix-Reddy cassaine 2008).

  Awaiting Ivan sign-off.
