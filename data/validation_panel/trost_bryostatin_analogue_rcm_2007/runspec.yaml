name: trost_bryostatin_analogue_rcm_2007

target:
  structure_path: structure.mol
  ring_size: 31

# Seco-precursor: the (already-macrolactonized) diene-tethered
# bryostatin-scaffold authored programmatically by
# scripts/build_trost_bryostatin_analogue_seco.py from the cyclized
# 31-membered macrolactone. Mass balance verified:
#   seco MW (C48H78O14, 878.5392) = cyclized MW (C46H74O14, 850.5079)
#                                 + ethylene (28.0313).
# The macrolactone ester (C(=O)-O) is RETAINED in the seco -- Trost's
# actual route runs Shiina/Yamaguchi macrolactonization BEFORE RCM.
# Only the new C=C of the macrocycle is formed by RCM.
blocks:
  - trost_bryostatin_analogue_seco

# Full M5 configuration: evaluate all 12 macrocyclization tactics on the
# same seco-precursor (proposal Section 5). The literature tactic is rcm;
# every other rule should emit a no-go certificate (LHS doesn't match
# the diene-only substrate). max_steps: 1 + ring_close_only: true keeps
# the search to a single firing per (rule, match site).
rules: all_macrocyclization

strategy:
  max_steps: 1
  ring_close_only: true
  predicates:
    is_intramolecular: true
    ring_size_equals: 31
    # Workstream D phase 3 ether discriminators. The seco substrate
    # has no Ar-X and no aryl-O acceptor, so both ether rules should
    # fail to match independently of these predicates; the predicates
    # are still set for schema consistency with the other panel cases.
    alcohol_partner_C_must_be_aromatic:
      biaryl_etherification: true
    alcohol_partner_C_must_be_sp3:
      aryl_etherification: true
    # E/Z geometry gate is DISABLED for v0 (same rationale as the
    # epothilone B case): MOD does not propagate E/Z through rule
    # firing (see docs/mod_stereo_reference.md), and Trost reports
    # 1:1 E:Z on this substrate anyway. Both isomers were chromato-
    # graphically separated and biologically evaluated as compounds
    # 178/179 in Jahan 2023 numbering. The Z gate is a Workstream F
    # deliverable.

# Energetics disabled for v0 panel calibration, matching the surrogate
# rcm cases, the epothilone B case, and the ascomylactam A reference run.
# The 1:1 E:Z selectivity is an energetics concern for v1, not v0.
energetics:
  enabled: false

solver:
  # M5 calls for <=10 strategy families in the shortlist (proposal Section 5).
  # SCIP backend, top_n: 10, request infeasibility certificates so
  # ruled-out tactics emit verifier-clean no-go certs.
  backend: scip
  top_n: 10
  time_budget_s: 120
  request_infeasibility_cert: true

notes: |
  Trost-Yang-Thiel-Frontier-Brindle ring-expanded bryostatin analogue
  (2007 JACS 129:2206-2207, DOI 10.1021/ja067305j; full paper 2011
  Chem. Eur. J. 17:9789-9805, DOI 10.1002/chem.201002932; open-access
  redrawing Jahan 2023 SynOpen 7:209 Scheme 19, DOI 10.1055/s-0042-1751453).

  31-membered macrolactone (vs. natural bryostatin's 26-membered ring).
  Grubbs-Hoveyda 2nd-generation catalyst, benzene, 50-80 C, high
  dilution, 80% yield, 1:1 E:Z mixture. Byproduct: ethylene.

  This is the ONLY published bryostatin-family RCM macrocyclization.
  Natural bryostatins are closed by Yamaguchi macrolactonization
  (Wender, Keck) or by Ru-Pd-Au cascade (Trost natural product),
  never by RCM. The 5-atom ring expansion versus the natural macro-
  cycle relieves the C16-C17 trans-trisubstituted alkene strain
  enough to let Grubbs catalysts close the diene.

  31-MEMBERED RING OUTLIER: this case exercises Macrocert's
  ring_size_equals(31) predicate at the upper end of the panel's
  ring-size range. All other panel cases are 12-16 membered. The
  RDKit SSSR perimeter walk recovers exactly 31 atoms in the
  macrocycle of the encoded cyclized form.

  ENCODING CAVEAT: the analogue is NOT in PubChem/ChEBI/CCDC. The
  encoded structure.mol is a chemistry-faithful 31-ring with
  embedded pyranoses, lactone, RCM alkene, cinnamate ester arm, and
  OAc/OH substituents -- not a precise atom-by-atom reproduction of
  Trost compound 3 (that would require the ACS/Wiley-paywalled SI).
  See scripts/build_trost_bryostatin_analogue.py docstring for the
  encoding contract.

  LARGE-RING TIMEOUT CAVEAT: MOD's match-time enumeration on the
  seco (31-ring with diene + flanking alkenes + pendant ester arm)
  may exceed the 180s pipeline budget on some campaign legs. A
  timeout outcome on individual legs is acceptable and gets reported
  as outcome: timeout by build_m5_campaign.py rather than infeasible.
