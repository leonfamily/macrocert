# expected.yaml — haidle_myers_cytochalasin_b_2004
#
# Updated 2026-05-24: the `hwe_olefination` rule has landed (Workstream
# C, see data/rules/hwe_olefination.{gml,meta.yaml}); this case is now
# fired by that rule on the seco precursor compound 3 (Scheme 7 of
# Haidle-Myers 2004 PNAS 101:12048). Previous TDA-biomimetic
# scaffolding is superseded.

literature_tactic: hwe_olefination

# 14 = cytochalasin B macrolactone (the largest cytochalasan ring).
# L-696,474 (an 11-ring carbocyclic congener) is described in the same
# Haidle-Myers 2004 paper but is not encoded in this slot.
literature_ring_size: 14

expected_witness: optimal

expected_top_rule_class: macrocyclization

# Moderate AE: dimethyl phosphate byproduct (~126 g/mol) — heavier than
# H2O / HF / H2 (high AE) but lighter than cross-coupling byproducts
# (>140 g/mol). The HWE rule's `high_atom_economy_bond` class flag and
# its membership in `high_ae_macrocyclization` are still defensible at
# the bond-level (no atom donation by activator, no transition-metal
# catalyst). At the panel-comparison level, however, ae_class:
# moderate is the honest call because the byproduct mass is ~7×
# heavier than the H2O/HF/H2 family. See
# data/rules/hwe_olefination.meta.yaml notes for the discussion.
ae_class: moderate

reference: |
  Haidle, A. M.; Myers, A. G. "An enantioselective, modular, and
  general route to the cytochalasins: Synthesis of L-696,474 and
  cytochalasin B." Proc. Natl. Acad. Sci. USA 2004, 101, 12048-12053.
  DOI: 10.1073/pnas.0402111101. PMC: PMC514432.

  Macrocyclization: intramolecular HWE olefination of the seco
  precursor compound 3 (Scheme 7), closing the 14-membered
  macrolactone with formation of the α,β-unsaturated-ester C=C
  (C13=C14, E) and expulsion of dimethyl phosphate. Yield 65%,
  single (E) diastereomer, α-stereocenter preserved.

  Conditions: NaOCH2CF3 in CF3CH2OH/DME at 23 °C — the Haidle-Myers
  epimerization-suppressed activator (see
  data/rules/hwe_olefination.meta.yaml reagent_mass_alternatives.haidle_myers
  for the full activator entry, DOI:10.1073/pnas.0402111101).

  Bond-level byproduct: (MeO)2P(O)OH, 126.05 g/mol (canonical
  dimethyl phosphate conjugate acid).

  Cytochalasin B structural data: PubChem CID 5311281, ChEBI:23528,
  C29H37NO5, MW 479.62 g/mol, CAS 14930-96-2. Built by
  scripts/build_cytochalasin_b.py.

  Biosynthesis review: Skellam, E. Nat. Prod. Rep. 2017, 34, 1252-1263.
  DOI: 10.1039/c7np00036g. (NOT 10.1039/c7np00045f as in the task
  brief; that DOI resolves to a different paper.)
