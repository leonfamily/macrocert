name: lactone_20_from_19_hydroxynonadecanoic_acid
target:
  structure_path: structure.mol
  ring_size: 20

blocks:
  - hydroxynonadecanoic_acid

rules: all_macrocyclization

strategy:
  max_steps: 1
  ring_close_only: true
  predicates:
    is_intramolecular: true
    ring_size_equals: 20

solver:
  backend: scip
  top_n: 3
  time_budget_s: 30

energetics:
  enabled: false

notes: |
  Surrogate macrolactonization case (ring size 20).
  Closes via one firing of the macrolactonization rule.
  Reference: Parenty, Moreau, Niel & Campagne 2013, Chem. Rev. — macrolactonization survey.
