# expected.yaml — phoenix_reddy_cassaine_tda_2008
#
# Target: TDA-immediate intermediate (tricycle 5) of Phoenix-Reddy-
# Deslongchamps 2008. 6-6-6 trans-decalin with one residual in-ring
# alkene (the TDA-preserved diene 2=3 bond) and an exocyclic alpha,
# beta-unsaturated methyl ester. C21H32O3, exact MW 332.235.
# Compound 5 is elaborated through ~6 further steps to (+)-cassaine
# (C24H39NO4, MW 405.288, PubChem CID 5281267).

literature_tactic: transannular_diels_alder

# Ring size of the macrocyclic-triene precursor (compound 4 in
# Phoenix-Reddy-Deslongchamps 2008). TDA closes this 14-membered ring
# to a 6-6-6 fused tricycle (compound 5), forming TWO new sigma C-C
# bonds in a single pericyclic event.
literature_ring_size: 14

expected_witness: optimal

expected_top_rule_class: macrocyclization

# AE class: TDA is byproduct-free (cycloaddition has 100% atom economy
# at the bond-formation step). Matches the high_atom_economy_bond
# class flag on the transannular_diels_alder rule and the rule meta's
# byproduct_mass_g_per_mol: 0.0.
ae_class: high

reference: |
  Phoenix, S.; Reddy, M. S.; Deslongchamps, P. "Total Synthesis of
  (+)-Cassaine via Transannular Diels-Alder Reaction." J. Am. Chem.
  Soc. 2008, 130, 13989-13995. DOI: 10.1021/ja805097s.

  Earlier communication: Phoenix, S.; Bourque, E.; Deslongchamps, P.
  Org. Lett. 2000, 2, 4149-4152. DOI: 10.1021/ol006670r.

  14-membered TDA methodology (Deslongchamps lineage):
    Lamothe, S.; Ndibwami, A.; Deslongchamps, P. Tetrahedron Lett.
    1988, 29, 1639 (theoretical, DOI 10.1016/S0040-4039(00)82005-5)
    and 1641 (experimental, DOI 10.1016/S0040-4039(00)82006-7).

  Transannular Diels-Alder closes the 14-membered macrocyclic triene
  4 (cis-trans-trans geometry) to give the trans-decalin tricycle 5.
  Thermal conditions (180-230 C in toluene/xylene); no catalyst.
  Stereochemistry controlled by macrocyclic preorganization. Tricycle
  5 is elaborated through ~6 further steps (stereoselective reduction,
  hydroboration, methyl cuprate 1,4-addition, dimethylaminoethyl-
  oxycarbonyl tethering, C8 epimerization, C3 deprotection) to
  (+)-cassaine 1 (C24H39NO4, MW 405.288, PubChem CID 5281267,
  ChEBI:3454). Byproduct: none. Ring size: 14 (precursor); 6-6-6
  fused tricycle (product).

  v0 panel encoding: structure.mol is the TDA-immediate tricycle 5
  (C21H32O3, MW 332.235) — methyl-ester / free-OH simplification of
  the paper's silyl-protected t-butyl-ester form. The natural product
  itself has no residual cyclohexene for the TDA rule to recognise
  on reverse synthesis; encoding the intermediate matches the
  *actual* macrocyclization event. See notes.md and
  research_brief.md §7 for the encoding-choice rationale.

  Stereo caveat: the v0 TDA rule carries no stereo annotations
  (Workstream F task #35 is queued but not yet done). The 4 new sp3
  centres installed by the TDA + the endo/exo split are not enforced
  on the panel run.
