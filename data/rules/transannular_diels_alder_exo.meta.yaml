# Stereo-aware exo sibling of transannular_diels_alder.
# Same chemistry as the base rule: thermal or Lewis-acid mediated [4+2]
# cycloaddition with zero bond-level byproduct. Exo face of approach.
# See docs/workstream_f_tda_stereo.md for the design rationale.

reagent_mass_g_per_mol: 10.0  # Lewis-acid catalyst, same as base rule

byproduct_mass_g_per_mol: 0.0

retained_root_atom: 1

classes:
  - macrocyclization
  - cc_closure
  - high_atom_economy_bond
  - biomimetic
  - stereo_aware
  - tda_exo

stereo_flags:
  - sets_four_sp3_stereocenters
  - exo
  - stereo_treatment_match_enforced
  - endo_exo_pair

refs:
  - "Lamothe, Ndibwami, Deslongchamps. Tetrahedron Lett. 1988, 29, 1639 (theory, DOI:10.1016/S0040-4039(00)82005-5)"
  - "Lamothe, Ndibwami, Deslongchamps. Tetrahedron Lett. 1988, 29, 1641 (experimental, DOI:10.1016/S0040-4039(00)82006-7)"
  - "Phoenix, Reddy, Deslongchamps. J. Am. Chem. Soc. 2008, 130, 13989-13995 (DOI:10.1021/ja805097s) -- endo product"
  - "Andersen, Flamm, Merkle, Stadler. ICGT 2017, DOI:10.1007/978-3-319-61470-0_4"

notes: |
  Enantiomer of transannular_diels_alder_endo at every new sp3 centre.
  See the endo sibling's meta for the design rationale and bracket-list
  convention. The two rules together form an endo/exo pair selected
  by the ``tda_stereo_aware`` rule set; a stereo-aware runspec selects
  one or both depending on which face is consistent with the substrate
  preorganisation.

  Exo is the kinetically less common outcome in macrocycle-preorganised
  TDA closures because the s-cis diene + ester dienophile system
  typically enjoys secondary-orbital stabilisation in the endo TS
  (Houk's analysis). Exo is observed when the macrocyclic tether
  geometrically forbids the endo approach. For (+)-cassaine
  (Phoenix-Reddy-Deslongchamps 2008) the experimental product is endo,
  so this rule emits an infeasibility certificate on the cassaine
  M5 leg under ``rules: tda_stereo_aware``.

# Stereo policy (Workstream F #36):
#   match_enforced — the R-side bracket lists are TetrahedralFixed and
#   MØD enforces the cyclohexene adduct's four sp³ stereocenters at
#   match time. See docs/workstream_f_alpha_c_overlays.md.
stereo_treatment: match_enforced
